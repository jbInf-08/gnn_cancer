# CI: byte-compile + pytest (import smoke; PyG tests skip if torch_geometric missing).
name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip wheel setuptools
          # CPU-only torch
          pip install torch==2.4.1 --index-url https://download.pytorch.org/whl/cpu
          # Companion PyG wheels for that torch version
          pip install torch-geometric==2.6.1
          pip install torch-scatter torch-sparse \
            -f "https://data.pyg.org/whl/torch-2.4.1+cpu.html" || true
          # Project package itself, without re-resolving torch
          pip install -e . --no-deps
          # Runtime dependencies (mirror what the package actually uses)
          pip install \
            numpy pandas scikit-learn networkx \
            matplotlib seaborn tqdm requests transformers \
            wandb imbalanced-learn umap-learn shap lime xgboost biopython \
            pytest pytest-cov
      - name: Byte-compile
        run: python -m compileall -q gnn_cancer
      - name: Guard top-level script sprawl
        run: |
          python - <<'PY'
          from pathlib import Path
          allowed = {
              "train.py",
              "run_pipeline.py",
              "preprocess_data.py",
              "pretrain.py",
              "visualize.py",
              "visualize_graph.py",
              "visualize_processing.py",
              "summarize_results.py",
              "setup_credentials.py",
          }
          offenders = sorted(
              p.name for p in Path(".").glob("*.py")
              if p.name not in allowed and p.name != "__init__.py"
          )
          if offenders:
              raise SystemExit(f"Unexpected top-level scripts: {', '.join(offenders)}")
          print("Top-level script guard passed.")
          PY
      - name: Pytest
        run: python -m pytest
        env:
          WANDB_MODE: disabled
          WANDB_API_KEY: ""
