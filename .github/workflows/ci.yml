# CI: byte-compile + pytest (import smoke; PyG tests skip if torch_geometric missing).
name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torch-geometric pytest
          T=$(python -c "import torch; print(torch.__version__.split('+')[0])")
          pip install "torch-scatter" "torch-sparse" -f "https://data.pyg.org/whl/torch-${T}+cpu.html" || true
          pip install -e ".[dev]" --no-deps
          pip install numpy pandas scikit-learn networkx matplotlib seaborn tqdm requests transformers \
            wandb imbalanced-learn umap-learn shap lime xgboost biopython
      - name: Byte-compile
        run: python -m compileall -q gnn_cancer
      - name: Pytest
        run: python -m pytest
        env:
          WANDB_MODE: disabled
          WANDB_API_KEY: ""
